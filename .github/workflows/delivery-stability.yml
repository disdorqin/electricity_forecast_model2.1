name: Delivery Stability

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  delivery-stability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pyarrow openpyxl

      - name: Static compilation check
        run: |
          python -m py_compile cli/parser.py
          python -m py_compile pipelines/delivery_quality.py
          python -m py_compile pipelines/emergency_fallback.py
          python -m py_compile pipelines/ledger_full.py
          python -m py_compile pipelines/ledger_predict.py
          python -m py_compile pipelines/ledger_weight.py
          python -m py_compile scripts/verify_range_pipeline.py
          echo "py_compile: all PASS"

      - name: CLI argument validation
        run: |
          python scripts/check_cli_range_args.py
          echo "CLI args: all PASS"

      - name: Synthetic delivery stability tests
        run: |
          python scripts/check_delivery_stability.py
          echo "Synthetic tests: all PASS"

      - name: Check --epf-v1-mode is hidden from help
        run: |
          if python main.py --help 2>&1 | grep -q "epf-v1-mode"; then
            echo "FAIL: epf-v1-mode still visible in help"
            exit 1
          fi
          echo "PASS: epf-v1-mode hidden from help"

      - name: Check no stale Chinese stage references
        run: |
          if python main.py --help 2>&1 | grep -q "四阶段"; then
            echo "FAIL: stale Chinese stage reference found"
            exit 1
          fi
          echo "PASS: no stale Chinese stage references"
