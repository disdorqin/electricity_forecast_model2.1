experiment_name: SGDFNet_CutoffRecovery_2026_Target_B3_SegmentFillBiasTrainVal
data_path: data/shandong_pmos_hourly.xlsx
output_root: outputs/RT916_SpikeMarketLab/cutoff_recovery_experiments
start_day: 2026-01-01
end_day: 2026-05-11
decision_hour: 15
val_days: 30
train_min_rows: 2160
da_fill_mode: segment_delta_bias
da_fill_bias_source: train_val
apply_segment_bias_calibration: true
calibration_segments:
  - "9_16"
calibration_mode: segment_bias
calibration_reducer: median

feature_config:
  include_forecast_columns: true
  include_actual_history_columns: true
  use_visible_actual_history: true
  include_delta_history_features: true
  include_tf_moving_average_features: false
  include_static_group_graph_features: false
  include_weekly_history_features: false
  include_forecast_residual_history_features: true
  include_segment_local_stats: false
  include_forecast_pressure_interactions: false
  include_calendar_features: true
  include_engineered_forecast_features: true

model_config:
  loss: absolute_error
  quantile_alpha: 0.5
  learning_rate: 0.05
  max_depth: 6
  max_iter: 300
  min_samples_leaf: 40
  l2_regularization: 0.1
  random_state: 42
  tail_sample_weight: 1.0
  tail_quantile: 0.85
  segment_conditioned_models: false
  risk_hour_primary_hours: []
  risk_hour_secondary_hours: []
  risk_hour_segments: []
  risk_hour_primary_weight: 1.0
  risk_hour_secondary_weight: 1.0
