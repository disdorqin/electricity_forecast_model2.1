experiment_name: SGDFNet_SignedTailCalibration_Base
data_path: data/shandong_pmos_hourly.xlsx
output_root: outputs/RT916_SpikeMarketLab/experiments
target_year: 2025
val_days: 30
train_min_rows: 2160
tail_quantile: 0.90
min_tail_count: 12
probability_trigger_quantile: 0.85
probability_scope: global
calibration_scope: all
baseline_artifact: outputs/RT916_SpikeMarketLab/experiments/SGDFNet_Followup_TFMovingAveragePlusPressure_V1_20260605_183728

feature_config:
  include_forecast_columns: true
  include_actual_history_columns: true
  include_delta_history_features: true
  include_tf_moving_average_features: true
  include_static_group_graph_features: false
  include_weekly_history_features: false
  include_forecast_residual_history_features: true
  include_segment_local_stats: false
  include_forecast_pressure_interactions: true
  include_calendar_features: true
  include_engineered_forecast_features: true

model_config:
  learning_rate: 0.05
  max_depth: 6
  max_iter: 300
  min_samples_leaf: 40
  l2_regularization: 0.1
  random_state: 42
